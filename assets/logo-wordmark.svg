    <rect x="70" y="66"  width="220" height="34" rx="9" fill="#F59E0B"/>
    <rect x="70" y="116" width="220" height="34" rx="9" fill="#FFFFFF" fill-opacity="0.9"/>
    <rect x="70" y="166" width="220" height="34" rx="9" fill="#FFFFFF" fill-opacity="0.9"/>
    <rect x="70" y="216" width="220" height="34" rx="9" fill="#FFFFFF" fill-opacity="0.9"/>
    <rect x="70" y="266" width="220" height="34" rx="9" fill="#F59E0B"/>
  </g>

  <!-- wordmark -->
  <text x="480" y="248" font-family="Arial, Helvetica, sans-serif" font-size="200"
        font-weight="800" fill="#0F172A" letter-spacing="4">LIST</text>
  <text x="486" y="330" font-family="Arial, Helvetica, sans-serif" font-size="52"

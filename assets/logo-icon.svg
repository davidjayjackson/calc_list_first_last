<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0B1020" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- rows: first and last highlighted (amber) -->
  <g filter="url(#shadow)">
    <rect x="232" y="213" width="560" height="78" rx="20" fill="#F59E0B"/>
    <rect x="232" y="317" width="560" height="78" rx="20" fill="#FFFFFF" fill-opacity="0.9"/>
    <rect x="232" y="421" width="560" height="78" rx="20" fill="#FFFFFF" fill-opacity="0.9"/>
    <rect x="232" y="525" width="560" height="78" rx="20" fill="#FFFFFF" fill-opacity="0.9"/>
    <rect x="232" y="629" width="560" height="78" rx="20" fill="#FFFFFF" fill-opacity="0.9"/>
    <rect x="232" y="733" width="560" height="78" rx="20" fill="#F59E0B"/>
  </g>

  <!-- first / last markers -->
  <g fill="#FFFFFF">
    <path d="M175 252 l34 -30 34 30 z"/>            <!-- up caret at first row -->
    <path d="M175 772 l34 30 34 -30 z"/>            <!-- down caret at last row -->
  </g>
</svg>
